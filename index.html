<!DOCTYPE html>
<html>
<head><title>OAuth</title></head>
<body>
    <h1>Processing...</h1>
    <script>
        const p = new URLSearchParams(location.search);
        if (p.get('code')) {
            document.body.innerHTML = '<h1>Code: ' + p.get('code') + '</h1><p>请把这个 code 发给 AI 助手</p>';
        } else {
            const shop = p.get('shop');
            if (shop) {
                location.href = 'https://' + shop + '/admin/oauth/authorize?client_id=4350c200c487b435725707ebcbdab39d&scope=read_orders,read_products,read_customers&redirect_uri=https://你的vercel地址/';
            }
        }
    </script>
</body>
</html>
